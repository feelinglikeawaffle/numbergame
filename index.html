<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Level Game</title>
<style>
  body { background:#111; color:#fff; font-family:Arial; text-align:center; padding-top:60px; }
  input { padding:10px; font-size:18px; width:200px; text-align:center; }
  button { padding:10px 20px; font-size:18px; cursor:pointer; margin-left:10px; }
  #feedback { margin-top:20px; font-size:22px; }
</style>
</head>
<body>

<h1>Level Game</h1>
<p id="levelText">Level: 1</p>
<p id="questionText"></p>

<input id="answerInput" placeholder="Your answer">
<button onclick="submitAnswer()">Submit</button>

<div id="feedback"></div>

<script>
// ------------------------------
// GAME MEMORY
// ------------------------------
let level = 1;
let state = {
  start: null,      // random number for level 1
  last: null,       // last correct answer
  answers: []       // all correct answers
};

// ------------------------------
// LEVELS (YOU EDIT THESE)
// question: text
// answer: fixed value OR a function(state)
// ------------------------------
const levels = [
  {
    question: () => {
      state.start = Math.floor(Math.random() * 99) + 1;
      return "The answer is " + state.start;
    },
    answer: (state) => state.start
  },

  {
    question: "Add 3 to your starting number.",
    answer: (state) => state.start + 3
  },

  {
    question: "Divide your last answer by 2.",
    answer: (state) => Math.floor(state.last / 2)
  },

  {
    question: "Add your first and second answers together.",
    answer: (state) => state.answers[0] + state.answers[1]
  }

  // Add more levels here...
];

// ------------------------------
// LOAD LEVEL
// ------------------------------
function loadLevel() {
  const data = levels[level - 1];

  const q = typeof data.question === "function"
            ? data.question()
            : data.question;

  document.getElementById("questionText").innerText = q;
  document.getElementById("answerInput").value = "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("levelText").innerText = "Level: " + level;
}

// ------------------------------
// SUBMIT ANSWER
// ------------------------------
function submitAnswer() {
  const user = document.getElementById("answerInput").value.trim();
  const data = levels[level - 1];

  // Compute correct answer
  const correct = (typeof data.answer === "function")
                  ? String(data.answer(state))
                  : String(data.answer);

  if (user === correct) {
    document.getElementById("feedback").innerText = "Correct!";

    // Update memory
    state.last = Number(correct);
    state.answers.push(Number(correct));

    level++;
    if (level > levels.length) level = 1;

  } else {
    document.getElementById("feedback").innerText = "Wrong! Back to Level 1.";

    // Reset everything
    level = 1;
    state = { start: null, last: null, answers: [] };
  }

  setTimeout(loadLevel, 1000);
}

// ------------------------------
// START GAME
// ------------------------------
loadLevel();
</script>

</body>
</html>
